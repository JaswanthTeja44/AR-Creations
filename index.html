<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>True AR World Drawing</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        
        /* The UI Board */
        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 20px;
            display: none; /* Hidden until AR starts */
            z-index: 100;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 80%;
            max-width: 350px;
        }
        .color-btn {
            width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ddd;
            display: inline-block; margin: 0 5px; cursor: pointer;
        }
        .controls { margin-top: 15px; }
        button {
            padding: 10px 15px; background: #ea4335; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;
        }
        #instructions {
            color: white; position: absolute; top: 20px; width: 100%; text-align: center;
            font-size: 18px; z-index: 50; display: none; text-shadow: 1px 1px 2px black;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    
    <div id="instructions">Tap and hold the screen to draw!</div>

    <div id="ui-container">
        <p style="margin: 0 0 10px 0; font-weight: bold;">Pencil Board</p>
        <div class="color-btn" style="background: #FF0000;" onclick="changeColor(0xFF0000)"></div>
        <div class="color-btn" style="background: #0000FF;" onclick="changeColor(0x0000FF)"></div>
        <div class="color-btn" style="background: #00FF00;" onclick="changeColor(0x00FF00)"></div>
        <div class="color-btn" style="background: #FFFFFF;" onclick="changeColor(0xFFFFFF)"></div>
        <div class="controls">
            <button onclick="clearDrawings()">Clear Board</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let container, camera, scene, renderer, controller;
        let isDrawing = false;
        let currentLine;
        let lines = [];
        let currentColor = 0xFF0000; 

        init();
        animate();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            // 1. Setup the 3D Scene (This is your virtual room)
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // Add lighting
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            // 2. Setup the WebGL Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; // Enable AR
            container.appendChild(renderer.domElement);

            // 3. Add the AR Start Button
            document.body.appendChild(ARButton.createButton(renderer, { 
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body } // Allows UI to show over the camera
            }));

            // 4. Setup the Controller (Screen Taps)
            controller = renderer.xr.getController(0);
            controller.addEventListener('selectstart', onSelectStart);
            controller.addEventListener('selectend', onSelectEnd);
            scene.add(controller);

            window.addEventListener('resize', onWindowResize);

            // Show UI only when AR is running
            renderer.xr.addEventListener('sessionstart', () => {
                document.getElementById('ui-container').style.display = 'block';
                document.getElementById('instructions').style.display = 'block';
            });
            renderer.xr.addEventListener('sessionend', () => {
                document.getElementById('ui-container').style.display = 'none';
                document.getElementById('instructions').style.display = 'none';
            });
        }

        // UI Functions mapped to global window for HTML buttons to access
        window.changeColor = function(hex) {
            currentColor = hex;
        }

        window.clearDrawings = function() {
            lines.forEach(line => scene.remove(line));
            lines = [];
        }

        function onSelectStart() {
            isDrawing = true;
            
            // Create a material for the 3D line
            const material = new THREE.LineBasicMaterial({
                color: currentColor,
                linewidth: 5 
            });
            
            // Create a buffer geometry to hold our 3D points
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(3000); // Max 1000 points per line
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setDrawRange(0, 0);

            currentLine = new THREE.Line(geometry, material);
            currentLine.userData.pointsCount = 0;
            
            // Add the line to the SCENE (World Space), not the camera.
            // This is why it stays in place when you look away!
            scene.add(currentLine);
            lines.push(currentLine);
        }

        function onSelectEnd() {
            isDrawing = false;
            currentLine = null;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render() {
            if (isDrawing && currentLine) {
                // Get the exact 3D position of the controller (your phone screen) in the real world
                const position = new THREE.Vector3();
                
                // Push the drawing point slightly in front of the camera (0.3 meters away)
                // so you can see what you are drawing
                position.set(0, 0, -0.3).applyMatrix4(controller.matrixWorld);

                const positions = currentLine.geometry.attributes.position.array;
                let count = currentLine.userData.pointsCount;

                // Add the new point to the line
                if (count < 1000) {
                    positions[count * 3] = position.x;
                    positions[count * 3 + 1] = position.y;
                    positions[count * 3 + 2] = position.z;
                    
                    currentLine.userData.pointsCount++;
                    currentLine.geometry.setDrawRange(0, currentLine.userData.pointsCount);
                    currentLine.geometry.attributes.position.needsUpdate = true;
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
